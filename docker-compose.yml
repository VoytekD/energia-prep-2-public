services:
    energia-prep-2:
      labels:
        - dozzle.enable=true
      build:
        context: .
        dockerfile: docker/Dockerfile
      image: energia-prep-2:latest
      container_name: energia-prep-2

      env_file:
        - .env

      environment:
        TZ: ${TZ}
        SQL_DIR: ${SQL_DIR:-/app/sql}
        DATA_DIR: ${DATA_DIR:-/app/data}
        API_HOST: ${API_HOST:-0.0.0.0}
        API_PORT: ${API_PORT:-8003}
        LOG_LEVEL: ${LOG_LEVEL:-INFO}

      volumes:
        - ./sql:/app/sql:ro
        - ./data:/app/data
        - ./config_form.yaml:/app/config_form.yaml:ro

      ports:
        - "${API_PORT:-8003}:8003"

      restart: unless-stopped

      healthcheck:
        test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8003/_health/status.json | grep -q '\"status\":\"up\"'"]
        interval: 20s
        timeout: 5s
        retries: 10
        start_period: 30s

networks:
  default:
    driver: bridge
