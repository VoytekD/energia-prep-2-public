services:
  energia-prep-2:
    labels:
      - dozzle.enable=true
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        VCS_REF: ${GIT_COMMIT:-dev}   # commit -> inny digest -> auto recreate
    image: energia-prep-2:latest
    container_name: energia-prep-2

    env_file:
      - .env

    environment:
      TZ: ${TZ}
      SQL_DIR: ${SQL_DIR:-/app/sql}
      API_PORT: ${API_PORT:-8003}

    volumes:
      - ${SQL_LOCAL_DIR:-./sql}:/app/sql

    ports:
      - "${API_PORT:-8003}:8003"

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:8003/_health/status.json | grep -q '\"status\":\"up\"'" ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  calc-listener:
    labels:
      - dozzle.enable=true
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        VCS_REF: ${GIT_COMMIT:-dev}
    image: energia-prep-2:latest
    container_name: calc-listener

    env_file:
      - .env

    environment:
      TZ: ${TZ}
      CALC_POLL_SEC: "3"
      PERIODIC_TICK_SEC: "60"
      DEBOUNCE_SECONDS: "2"
      CALC_RUN_ON_STARTUP: "true"
      PREP_WAIT_SEC: "10"
      PREP_HEARTBEAT_SEC: "30"

      CALC_RECREATE_MODE: "truncate"
      #"none" / "" / "append" / "off" → doklejanie wierszy (nic nie czyścimy przed insertem),
      #"truncate" (domyślnie) → usuniecie wierszy
      #"drop" → DROP & CREATE wszystkich stage’ów (atomowo)
      CALC_COPY_THRESHOLD: 5000
    entrypoint: ["python", "-m", "energia_prep2.calc.listener"]

    depends_on:
      energia-prep-2:
        condition: service_healthy

networks:
  default:
    driver: bridge
